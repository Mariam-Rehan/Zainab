# Streamlit Community Cloud: pins Python 3.12 (TensorFlow has no wheels for 3.14).
name: zainab
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - tensorflow>=2.15,<2.22
      - yfinance>=0.2.40
      - pandas>=2.0,<3.1
      - numpy>=1.24,<2.5
      - scikit-learn>=1.3,<1.9
      - streamlit>=1.30,<2
      - joblib>=1.3
